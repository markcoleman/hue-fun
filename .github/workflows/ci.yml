name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
          - "24"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: ${{ matrix.node }}

      - run: npm ci
      - run: npm run generate:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - if: matrix.node == '22'
        run: npm run docs

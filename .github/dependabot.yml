version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      typescript-tooling:
        patterns:
          - "@hey-api/*"
          - "@types/*"
          - "tsdown"
          - "tsx"
          - "typedoc"
          - "typescript"
          - "vitest"
      npm-patch-and-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github_actions"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    commit-message:
      prefix: "devcontainer"
      include: "scope"
    labels:
      - "dependencies"
      - "devcontainer"
    open-pull-requests-limit: 2
